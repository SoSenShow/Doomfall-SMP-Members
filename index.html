<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMFALL | THE ELITE 25</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --crimson: #FF0000;
            --blood-dark: #2a0000;
            --abyss: #0a0a0a;
            --surface: #121212;
        }

        body {
            background-color: var(--abyss);
            color: white;
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
            cursor: default;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000000 100%);
            z-index: -1;
            animation: pulseBg 10s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .doom-title {
            font-family: 'Cinzel Decorative', cursive;
            text-shadow: 0 0 20px var(--crimson);
            animation: flicker 3s infinite ease-in-out;
            letter-spacing: 0.1em;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; transform: scale(1); filter: blur(0px); }
            50% { opacity: 0.8; transform: scale(1.02); filter: blur(1px); }
            52% { opacity: 1; }
        }

        .member-card {
            background: var(--surface);
            border: 1px solid #222;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform-style: preserve-3d;
        }

        .member-card:hover {
            border-color: var(--crimson);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
            transform: translateY(-10px) rotateX(5deg);
            z-index: 10;
        }

        .edit-active {
            border: 2px solid #fbbf24 !important;
            animation: pulse-edit 2s infinite;
        }

        @keyframes pulse-edit {
            0%, 100% { box-shadow: 0 0 5px #fbbf24; }
            50% { box-shadow: 0 0 20px #fbbf24; }
        }

        .vacant-card {
            border: 1px dashed #333;
            background: transparent;
            opacity: 0.6;
        }

        .vacant-card:hover {
            opacity: 1;
            border-color: var(--crimson);
            background: rgba(255, 0, 0, 0.02);
        }

        .btn-abyss {
            position: relative;
            background: transparent;
            border: 1px solid var(--crimson);
            overflow: hidden;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn-abyss::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,0,0.4), transparent);
            transition: 0.5s;
        }

        .btn-abyss:hover::before {
            left: 100%;
        }

        .btn-abyss:hover {
            box-shadow: 0 0 20px var(--crimson);
            background: var(--crimson);
            color: black;
        }

        .admin-modal {
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid var(--crimson);
            backdrop-filter: blur(10px);
            display: none;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
        }

        .reveal {
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #hero-section { transition: all 0.8s ease; }
        #roster { display: none; opacity: 0; }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="noise-overlay"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full p-8 flex justify-between items-center z-40">
        <div class="text-crimson font-bold text-2xl tracking-[0.3em] uppercase">DOOMFALL</div>
        <div class="flex items-center gap-6">
            <div id="editModeIndicator" class="hidden flex items-center gap-2 bg-yellow-600/20 px-3 py-1 rounded border border-yellow-600">
                <span class="w-2 h-2 bg-yellow-500 rounded-full animate-ping"></span>
                <span class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest">Edit Mode Active</span>
            </div>
            <button onclick="toggleAdminModal()" class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 hover:text-crimson transition-colors">System_Admin</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero-section" class="h-screen flex flex-col items-center justify-center text-center px-4">
        <div class="mb-2 text-crimson tracking-[1em] text-xs font-bold reveal" style="animation-delay: 0.2s;">ESTABLISHED IN CHAOS</div>
        <h1 class="doom-title text-7xl md:text-[10rem] font-black mb-8 reveal" style="animation-delay: 0.4s;">DOOMFALL</h1>
        <div class="h-[1px] w-24 bg-red-600 mb-12 reveal" style="animation-delay: 0.5s;"></div>
        <button onclick="enterAbyss()" class="btn-abyss px-16 py-5 text-sm font-bold reveal" style="animation-delay: 0.6s;">VIEW MEMBERS</button>
    </section>

    <!-- Roster Grid -->
    <section id="roster" class="max-w-7xl mx-auto py-32 px-6 min-h-screen">
        <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-4">
            <div>
                <h2 class="text-5xl font-black italic tracking-tighter uppercase leading-none">THE ELITE 25</h2>
                <p class="text-red-600 text-xs tracking-widest mt-2 font-bold uppercase">Authorized Personnel Only</p>
            </div>
            <div class="flex items-center gap-4">
                <button id="adminEditBtn" onclick="toggleEditMode()" class="hidden text-[10px] bg-white text-black px-4 py-2 hover:bg-red-600 hover:text-white transition-colors tracking-[0.2em] font-bold uppercase">Edit Members</button>
                <button onclick="showHero()" class="text-[10px] border-b border-zinc-800 pb-1 text-zinc-500 hover:text-white transition-colors tracking-[0.3em] font-bold uppercase">← Back to Terminal</button>
            </div>
        </div>
        <div id="membersGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
            <!-- Members dynamically loaded -->
        </div>
    </section>

    <!-- Admin Terminal Modal -->
    <div id="adminModal" class="admin-modal fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md p-10 z-[60]">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-crimson font-bold tracking-[0.3em] text-sm">SECURITY CHECK</h3>
            <button onclick="toggleAdminModal()" class="text-zinc-600 hover:text-white">✕</button>
        </div>
        <div id="loginForm">
            <div class="mb-4">
                <label class="block text-[10px] text-zinc-500 mb-1 uppercase tracking-widest">Identify</label>
                <input type="email" id="adminEmail" class="w-full bg-zinc-900 border border-zinc-800 p-4 text-sm text-white focus:outline-none focus:border-red-600 transition-all">
            </div>
            <div class="mb-8">
                <label class="block text-[10px] text-zinc-500 mb-1 uppercase tracking-widest">Security Key</label>
                <input type="password" id="adminPass" class="w-full bg-zinc-900 border border-zinc-800 p-4 text-sm text-white focus:outline-none focus:border-red-600 transition-all">
            </div>
            <button onclick="attemptLogin()" class="w-full bg-red-600 py-4 text-xs font-bold uppercase tracking-widest hover:bg-red-700 transition-all text-black">Decrypt & Access</button>
        </div>
        <div id="editPanel" class="hidden text-center">
            <div class="w-12 h-12 border-2 border-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-green-500">✓</span>
            </div>
            <p class="text-white text-sm font-bold mb-2">ACCESS GRANTED</p>
            <p class="text-zinc-500 text-[10px] mb-6 uppercase tracking-widest">"Edit Members" button ab grid ke upar dikhega.</p>
            <button onclick="logout()" class="text-[10px] text-red-500 underline tracking-widest uppercase">Terminate Link</button>
        </div>
    </div>

    <!-- Edit Member Modal -->
    <div id="editSlotModal" class="admin-modal fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm p-8 z-[70] hidden">
        <h3 class="text-white mb-6 uppercase text-xs font-bold tracking-widest">Edit Entry #<span id="editingIndex">0</span></h3>
        <div class="mb-4">
            <label class="block text-[10px] text-zinc-500 mb-1 uppercase tracking-widest">Player Name</label>
            <input type="text" id="editName" placeholder="Player Username" class="w-full bg-zinc-900 border border-zinc-800 p-3 text-sm text-white focus:border-red-600 outline-none">
        </div>
        <div class="mb-6">
            <label class="block text-[10px] text-zinc-500 mb-1 uppercase tracking-widest">Logo / Skin (Username or Link)</label>
            <input type="text" id="editHead" placeholder="Head Skin URL or Username" class="w-full bg-zinc-900 border border-zinc-800 p-3 text-sm text-white focus:border-red-600 outline-none">
        </div>
        <div class="flex gap-3">
            <button onclick="saveSlot()" class="flex-1 bg-green-700 py-3 text-[10px] font-bold uppercase tracking-widest text-white">SAVE CHANGES</button>
            <button onclick="closeEditSlot()" class="flex-1 bg-zinc-800 py-3 text-[10px] font-bold uppercase tracking-widest text-zinc-400">ABORT</button>
        </div>
    </div>

    <script>
        // Data State
        let members = JSON.parse(localStorage.getItem('doomfall_members')) || Array(25).fill(null).map(() => ({ name: '', head: '' }));
        let isAdmin = false;
        let editMode = false;
        let currentEditIndex = -1;

        // Navigation Logic
        function enterAbyss() {
            const hero = document.getElementById('hero-section');
            const roster = document.getElementById('roster');
            hero.style.opacity = '0';
            hero.style.transform = 'scale(0.9)';
            setTimeout(() => {
                hero.style.display = 'none';
                roster.style.display = 'block';
                setTimeout(() => {
                    roster.style.opacity = '1';
                    window.scrollTo({ top: 0, behavior: 'instant' });
                }, 50);
            }, 600);
        }

        function showHero() {
            const hero = document.getElementById('hero-section');
            const roster = document.getElementById('roster');
            roster.style.opacity = '0';
            setTimeout(() => {
                roster.style.display = 'none';
                hero.style.display = 'flex';
                setTimeout(() => {
                    hero.style.opacity = '1';
                    hero.style.transform = 'scale(1)';
                }, 50);
            }, 600);
        }

        // Grid Rendering
        function renderGrid() {
            const grid = document.getElementById('membersGrid');
            grid.innerHTML = '';
            
            members.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = `member-card h-64 flex flex-col items-center justify-center rounded-xl p-6 text-center transition-all duration-300 ${!m.name ? 'vacant-card' : ''} ${editMode ? 'edit-active cursor-pointer' : 'cursor-default'}`;
                card.style.animation = `slideUp 0.6s ease forwards ${i * 0.05}s`;
                card.style.opacity = '0';

                if (m.name) {
                    const headUrl = m.head.includes('http') ? m.head : `https://mc-heads.net/head/${m.head}/128`;
                    card.innerHTML = `
                        <div class="relative group">
                            <div class="absolute -inset-1 bg-red-600 rounded-full blur opacity-25 transition duration-1000"></div>
                            <img src="${headUrl}" alt="${m.name}" class="relative w-24 h-24 mb-6 transition-transform duration-500">
                        </div>
                        <div class="text-white font-bold tracking-widest uppercase text-sm">${m.name}</div>
                        <div class="text-[9px] text-zinc-600 mt-2 uppercase tracking-[0.2em]">Rank: Elite</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="w-12 h-12 border border-zinc-800 rounded-full flex items-center justify-center mb-4 text-zinc-800">?</div>
                        <div class="text-zinc-700 text-[10px] font-bold tracking-[0.3em] uppercase">Soul Needed</div>
                    `;
                }

                card.addEventListener('click', (e) => {
                    if (isAdmin && editMode) {
                        openEditSlot(i);
                    }
                });

                grid.appendChild(card);
            });
        }

        // Admin Security
        function toggleAdminModal() {
            const modal = document.getElementById('adminModal');
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
        }

        function attemptLogin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;

            if (email === 'tdas81378@gmail.com' && pass === 'meisshub') {
                isAdmin = true;
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('editPanel').classList.remove('hidden');
                document.getElementById('adminEditBtn').classList.remove('hidden');
                document.body.style.boxShadow = "inset 0 0 100px rgba(255,0,0,0.1)";
            } else {
                alert("ACCESS DENIED.");
            }
        }

        function toggleEditMode() {
            editMode = !editMode;
            const btn = document.getElementById('adminEditBtn');
            const indicator = document.getElementById('editModeIndicator');
            
            if (editMode) {
                btn.innerText = "Exit Edit Mode";
                btn.classList.add('bg-red-600', 'text-white');
                indicator.classList.remove('hidden');
            } else {
                btn.innerText = "Edit Members";
                btn.classList.remove('bg-red-600', 'text-white');
                indicator.classList.add('hidden');
            }
            renderGrid();
        }

        function logout() {
            isAdmin = false;
            editMode = false;
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('editPanel').classList.add('hidden');
            document.getElementById('adminEditBtn').classList.add('hidden');
            document.getElementById('editModeIndicator').classList.add('hidden');
            document.body.style.boxShadow = "none";
            toggleAdminModal();
            renderGrid();
        }

        function openEditSlot(index) {
            currentEditIndex = index;
            document.getElementById('editingIndex').innerText = index + 1;
            document.getElementById('editName').value = members[index].name;
            document.getElementById('editHead').value = members[index].head;
            document.getElementById('editSlotModal').style.display = 'block';
        }

        function closeEditSlot() {
            document.getElementById('editSlotModal').style.display = 'none';
        }

        function saveSlot() {
            const name = document.getElementById('editName').value;
            const head = document.getElementById('editHead').value;
            
            members[currentEditIndex] = { name, head };
            localStorage.setItem('doomfall_members', JSON.stringify(members));
            renderGrid();
            closeEditSlot();
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
