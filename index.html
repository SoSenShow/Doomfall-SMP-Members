<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM MC PVP TOURNAMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --neon-green: #55FF55;
            --cyber-gold: #FFD700;
            --discord-blurple: #5865F2;
            --bg-dark: #0a0a0a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            perspective: 1000px;
        }

        .title-font { font-family: 'Syncopate', sans-serif; }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glitch {
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 255, 0, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        .radial-glow {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2), 0 0 60px rgba(255, 215, 0, 0.1);
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
        }

        .blurple-gradient {
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
        }

        .nav-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--cyber-gold);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center overflow-hidden">

    <canvas id="bg-canvas"></canvas>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed top-4 left-4 h-[calc(100vh-32px)] w-72 glass rounded-2xl transform -translate-x-[120%] z-50 p-8 flex flex-col items-center shadow-2xl">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-[#55FF55] to-[#FFD700] rounded-full blur opacity-25 group-hover:opacity-75 transition duration-1000"></div>
            <div class="relative w-32 h-32 bg-gray-800 rounded-full mb-6 border-2 border-white/10 overflow-hidden">
                <img id="user-avatar" src="" alt="Avatar" class="w-full h-full object-cover opacity-0 transition-opacity duration-500">
            </div>
        </div>
        
        <h3 id="user-name" class="text-2xl font-black title-font mb-1 tracking-tighter uppercase text-center">LOADING...</h3>
        <div class="flex items-center gap-2 mb-8">
            <span class="w-2 h-2 bg-[#55FF55] rounded-full animate-pulse"></span>
            <span class="text-[#55FF55] text-[10px] font-black uppercase tracking-[0.2em]">Verified Elite</span>
        </div>
        
        <div class="w-full space-y-4">
            <button onclick="logout()" class="w-full py-2 text-[10px] uppercase tracking-widest font-bold text-red-500 hover:text-red-400 transition-colors">Logout Session</button>
        </div>
    </div>

    <!-- Main Landing Screen -->
    <div id="landing-screen" class="text-center z-10 w-full max-w-6xl px-4">
        <h1 class="glitch title-font text-5xl md:text-8xl font-black mb-12 tracking-tighter italic">
            MC <span class="text-[#55FF55]">PVP</span> <span class="text-[#FFD700]">TOURNAMENT</span>
        </h1>

        <div id="action-container" class="flex flex-col items-center justify-center gap-8">
            <!-- Initial Verify Button -->
            <button id="verify-btn" onclick="redirectToDiscord()" class="blurple-gradient flex items-center gap-4 text-white font-black py-5 px-10 rounded-full shadow-xl transform transition-all active:scale-95 group">
                <svg class="w-7 h-7 fill-white" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.06,72.06,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21a105.73,105.73,0,0,0,32.28,16.15,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.29-16.15C129.5,50.55,124.27,27.05,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
                <span class="tracking-widest uppercase text-sm">Verify Identity</span>
            </button>

            <!-- Verified Menu (Hidden Initially) -->
            <div id="verified-content" class="hidden w-full">
                <button id="start-btn" class="radial-glow bg-[#FFD700] text-black font-black py-6 px-20 text-4xl rounded-full shadow-2xl transition-all hover:scale-110 active:scale-90 title-font mb-16 inline-block">
                    START
                </button>

                <!-- 4-Card Menu -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-5xl mx-auto opacity-0 translate-y-10" id="menu-cards">
                    <div class="nav-card glass p-6 rounded-2xl border border-white/5 cursor-pointer">
                        <div class="text-[#FFD700] mb-4 text-3xl font-bold">01</div>
                        <h4 class="title-font text-xs tracking-widest font-bold">STANDINGS</h4>
                    </div>
                    <div class="nav-card glass p-6 rounded-2xl border border-white/5 cursor-pointer">
                        <div class="text-[#FFD700] mb-4 text-3xl font-bold">02</div>
                        <h4 class="title-font text-xs tracking-widest font-bold">MATCHES</h4>
                    </div>
                    <div class="nav-card glass p-6 rounded-2xl border border-white/5 cursor-pointer">
                        <div class="text-[#FFD700] mb-4 text-3xl font-bold">03</div>
                        <h4 class="title-font text-xs tracking-widest font-bold">ADMIN</h4>
                    </div>
                    <div class="nav-card glass p-6 rounded-2xl border border-white/5 cursor-pointer">
                        <div class="text-[#FFD700] mb-4 text-3xl font-bold">04</div>
                        <h4 class="title-font text-xs tracking-widest font-bold">PLAYOFFS</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Discord OAuth2 Configuration ---
        const CLIENT_ID = '1477950063941783604';
        const REDIRECT_URI = 'http://127.0.0.1:5500/index.html';

        /**
         * Redirect to Discord OAuth2
         */
        function redirectToDiscord() {
            const scope = encodeURIComponent('identify');
            const encodedRedirect = encodeURIComponent(REDIRECT_URI);
            // Constructing the exact URL format requested
            const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodedRedirect}&response_type=token&scope=${scope}`;
            
            console.log("Redirecting to Discord:", authUrl);
            window.location.href = authUrl;
        }

        /**
         * Extract token from window.location.hash and fetch profile
         */
        async function handleAuth() {
            const hash = window.location.hash;
            const params = new URLSearchParams(hash.slice(1));
            const accessToken = params.get('access_token');

            if (accessToken) {
                // Clear the hash from the URL bar for a cleaner experience
                window.history.replaceState({}, document.title, window.location.pathname);
                localStorage.setItem('dc_token', accessToken);
                await initializeUserSession(accessToken, true);
            } else {
                // Check if we already have a token saved
                const savedToken = localStorage.getItem('dc_token');
                if (savedToken) {
                    await initializeUserSession(savedToken, false);
                }
            }
        }

        /**
         * Fetch profile from Discord API
         */
        async function initializeUserSession(token, isNewLogin) {
            try {
                const response = await fetch('https://discord.com/api/v10/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Discord Session Expired or Invalid');
                }

                const userData = await response.json();
                updateUserUI(userData, isNewLogin);
            } catch (err) {
                console.error("Auth initialization failed:", err);
                localStorage.removeItem('dc_token');
            }
        }

        /**
         * Update the UI with Discord profile data and trigger animations
         */
        function updateUserUI(user, animate) {
            // Update Sidebar Info
            const avatarEl = document.getElementById('user-avatar');
            document.getElementById('user-name').innerText = user.username;
            
            if (user.avatar) {
                avatarEl.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256`;
            } else {
                // Default avatar logic for users without a custom one
                const defaultIdx = user.discriminator === '0' ? (user.id >> 22) % 6 : user.discriminator % 5;
                avatarEl.src = `https://cdn.discordapp.com/embed/avatars/${defaultIdx}.png`;
            }
            avatarEl.style.opacity = '1';

            // Swap Verify button for the Verified Menu
            document.getElementById('verify-btn').classList.add('hidden');
            document.getElementById('verified-content').classList.remove('hidden');

            if (animate) {
                // Sidebar Slide In animation
                anime({
                    targets: '#sidebar',
                    translateX: ['-120%', 0],
                    duration: 1200,
                    easing: 'easeOutExpo'
                });

                // Start Button scale animation
                anime({
                    targets: '#start-btn',
                    scale: [0, 1],
                    opacity: [0, 1],
                    duration: 800,
                    easing: 'easeOutElastic(1, .6)'
                });

                // Menu Cards staggered entrance
                anime({
                    targets: '#menu-cards',
                    translateY: [40, 0],
                    opacity: [0, 1],
                    delay: 400,
                    duration: 1000,
                    easing: 'easeOutExpo'
                });
            } else {
                // Instantly set states if no animation needed
                document.getElementById('sidebar').style.transform = 'translateX(0)';
                document.getElementById('menu-cards').style.opacity = '1';
                document.getElementById('menu-cards').style.transform = 'translateY(0)';
            }
        }

        /**
         * Clear session and return to initial state
         */
        function logout() {
            localStorage.removeItem('dc_token');
            window.location.href = REDIRECT_URI;
        }

        // --- Visual Background Effects (Dynamic Canvas) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = Math.random() > 0.5 ? '#55FF55' : '#FFD700';
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // Initial setup
        initCanvas();
        for (let i = 0; i < 100; i++) particles.push(new Particle());
        animate();
        window.addEventListener('resize', initCanvas);

        // Check for authentication on page load
        window.addEventListener('load', handleAuth);
    </script>
</body>
</html>
