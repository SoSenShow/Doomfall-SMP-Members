<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMFALL | THE DARK RITUAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Metal+Mania&family=Nosifer&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood: #8b0000;
            --hellfire: #ff0000;
            --abyss: #050000;
            --void: #000000;
        }

        body {
            background-color: var(--void);
            color: #fff;
            font-family: 'Metal Mania', cursive;
            overflow-x: hidden;
            cursor: url('https://cur.cursors-4u.net/games/gam-4/gam372.cur'), auto;
        }

        /* --- SACRIFICIAL ALTAR BACKGROUND --- */
        .ritual-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(139, 0, 0, 0.15) 0%, transparent 70%),
                url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            z-index: -1;
        }

        .pentagram-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vh;
            height: 100vh;
            opacity: 0.05;
            pointer-events: none;
            filter: drop-shadow(0 0 20px var(--hellfire));
            animation: rotate-slow 60s linear infinite;
        }

        @keyframes rotate-slow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- DEMONIC TEXT --- */
        .nosifer { font-family: 'Nosifer', cursive; }
        .gothic { font-family: 'UnifrakturMaguntia', serif; }

        .blood-text {
            color: var(--hellfire);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8), 2px 2px 2px #000;
        }

        /* --- RITUAL CARDS --- */
        .ritual-card {
            background: linear-gradient(135deg, #1a0000 0%, #0a0000 100%);
            border: 2px solid #2a0000;
            position: relative;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            width: 100%; /* Ensures it fits container on mobile */
        }

        .ritual-card:hover {
            border-color: var(--hellfire);
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        .card-number {
            font-family: 'Creepster', cursive;
            color: var(--blood);
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            opacity: 0.5;
        }

        /* --- BLOOD DRIP ANIMATION --- */
        .drip {
            position: absolute;
            top: 0;
            width: 2px;
            background: var(--hellfire);
            height: 0;
            animation: dripping 3s infinite;
        }

        @keyframes dripping {
            0% { height: 0; opacity: 1; }
            100% { height: 100px; opacity: 0; }
        }

        /* --- CUSTOM BUTTON --- */
        .sacrificial-btn {
            background: #4a0000;
            border: 2px solid var(--hellfire);
            padding: 12px 30px;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            text-transform: uppercase;
        }

        @media (min-width: 768px) {
            .sacrificial-btn {
                padding: 15px 40px;
                font-size: 1.2rem;
                letter-spacing: 5px;
            }
        }

        .sacrificial-btn:hover {
            background: var(--hellfire);
            color: #000;
            box-shadow: 0 0 50px var(--hellfire);
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--blood); }
    </style>
</head>
<body>

    <div class="ritual-bg"></div>
    <img src="https://www.transparentpng.com/download/pentagram/pentagram-simple-design-png-6.png" class="pentagram-overlay" alt="pentagram">

    <!-- Header Section -->
    <header class="fixed top-0 w-full z-[100] p-4 md:p-6 border-b border-red-900/30 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center gap-4">
            <span class="nosifer text-red-600 text-lg md:text-2xl tracking-tighter">DOOMFALL</span>
        </div>
        <div class="flex gap-4 md:gap-8 text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.3em] font-bold">
            <button onclick="toggleAdminModal()" class="text-red-700 hover:text-red-500 font-black">Admin Override</button>
        </div>
    </header>

    <!-- Hero / Entry -->
    <section id="hero" class="relative min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        <div class="mb-4 md:mb-6 nosifer text-red-700 animate-pulse text-[10px] md:text-sm">25 Souls Required for the Ritual</div>
        <h1 class="gothic text-5xl md:text-8xl lg:text-9xl mb-8 md:mb-10 blood-text leading-tight">Forbidden <br> Covenant</h1>
        <p class="max-w-xl text-zinc-500 italic mb-10 md:mb-12 gothic text-base md:text-lg">"In the shadow of the abyss, twenty-five shall stand. Bound by blood, marked by fate."</p>
        <button onclick="beginRitual()" class="sacrificial-btn nosifer">VIEW MEMBERS</button>
    </section>

    <!-- Main Grid -->
    <section id="roster" class="relative z-10 max-w-7xl mx-auto py-24 md:py-32 px-6 hidden opacity-0 transition-all duration-1000">
        <div class="text-center mb-16 md:mb-24">
            <h2 class="nosifer text-3xl md:text-5xl text-red-600 mb-4 uppercase">Doomfall Members</h2>
            <div class="w-24 md:w-32 h-1 bg-red-600 mx-auto"></div>
        </div>

        <!-- Grid updated for better mobile responsiveness -->
        <div id="membersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-8 md:gap-12">
            <!-- Rendered via JS -->
        </div>

        <div class="mt-16 md:mt-24 flex flex-col md:flex-row items-center justify-center gap-6">
            <button id="adminBtn" onclick="toggleEditMode()" class="hidden sacrificial-btn text-[10px] md:text-xs px-8 md:px-10 w-full md:w-auto">Alter the Contract</button>
            <button onclick="endRitual()" class="px-8 py-3 border border-red-900/50 text-red-900 hover:text-red-500 transition-all uppercase text-[9px] md:text-[10px] tracking-[0.4em] md:tracking-[0.5em] w-full md:w-auto">Back to Home</button>
        </div>
    </section>

    <!-- Admin Login -->
    <div id="adminModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
        <div class="w-full max-w-md p-8 md:p-12 border-2 border-red-900 bg-[#050000] relative">
            <div class="drip" style="left: 10%;"></div>
            <div class="drip" style="left: 90%; animation-delay: 1.5s;"></div>
            
            <h3 class="nosifer text-red-600 text-center text-lg md:text-xl mb-8 md:mb-12 uppercase">Identify Yourself</h3>
            <div id="loginForm" class="space-y-6 md:space-y-8">
                <input type="email" id="adminEmail" class="w-full bg-transparent border-b border-red-900/50 p-3 md:p-4 outline-none focus:border-red-600 transition-all text-red-500 font-mono text-sm" placeholder="Sinner's Email">
                <input type="password" id="adminPass" class="w-full bg-transparent border-b border-red-900/50 p-3 md:p-4 outline-none focus:border-red-600 transition-all text-red-500 font-mono text-sm" placeholder="Sacrificial Key">
                <button onclick="verifyAccess()" class="w-full sacrificial-btn py-3 md:py-4 text-xs">Pass Through</button>
            </div>
            <div id="adminSuccess" class="hidden text-center py-6 md:py-10">
                <p class="nosifer text-white mb-8 md:mb-10 text-sm">Welcome back, Archdemon.</p>
                <button onclick="logout()" class="text-red-600 underline text-[10px] tracking-widest uppercase">Relinquish Power</button>
            </div>
            <button onclick="toggleAdminModal()" class="absolute top-4 right-4 text-red-900 text-xl">✕</button>
        </div>
    </div>

    <!-- Edit Entity -->
    <div id="editSlotModal" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-4 bg-black/90">
        <div class="w-full max-w-lg p-6 md:p-10 bg-[#0a0000] border-2 border-red-600 shadow-[0_0_50px_rgba(139,0,0,0.3)]">
            <h4 class="nosifer text-red-600 text-center mb-8 md:mb-10 text-sm md:text-base">Modify the Soul</h4>
            <div class="space-y-6 md:space-y-8">
                <input type="text" id="editName" class="w-full bg-black border border-red-900 p-3 md:p-4 text-red-500 nosifer focus:border-red-600 outline-none text-xs" placeholder="Soul Alias">
                
                <div class="flex flex-col items-center">
                    <div id="previewBox" class="w-24 h-24 md:w-32 md:h-32 border-2 border-red-900/30 flex items-center justify-center bg-black mb-4 md:mb-6 relative group overflow-hidden">
                        <img id="headPreview" src="" class="hidden w-full h-full object-contain">
                        <span class="nosifer text-[8px] md:text-[10px] text-red-900">No Essence</span>
                    </div>
                    <input type="file" id="fileInput" class="hidden" onchange="processFile(this)">
                    <button onclick="document.getElementById('fileInput').click()" class="text-[8px] md:text-[10px] text-red-600 border border-red-900 px-4 md:px-6 py-2 hover:bg-red-900/20 transition-all nosifer">Capture Image</button>
                    <input type="hidden" id="headBase64">
                </div>

                <div class="flex flex-col md:flex-row gap-4">
                    <button onclick="confirmEdit()" class="flex-1 sacrificial-btn text-[10px] py-3 md:py-4">Bind Soul</button>
                    <button onclick="closeEditModal()" class="flex-1 bg-transparent border border-red-900 text-red-900 py-3 md:py-4 text-[10px] font-bold hover:text-red-500 uppercase">Banish</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load state from localStorage or default
        let members = JSON.parse(localStorage.getItem('doomfall_ritual_data')) || Array(25).fill(null).map(() => ({ name: '', head: '' }));
        let isAdmin = false;
        let isEditMode = false;
        let targetIndex = -1;

        // UI Logic
        function beginRitual() {
            document.getElementById('hero').style.transform = 'translateY(-50px)';
            document.getElementById('hero').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('hero').classList.add('hidden');
                const roster = document.getElementById('roster');
                roster.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setTimeout(() => roster.style.opacity = '1', 100);
            }, 500);
            renderRitual();
        }

        function endRitual() {
            const roster = document.getElementById('roster');
            roster.style.opacity = '0';
            setTimeout(() => {
                roster.classList.add('hidden');
                const hero = document.getElementById('hero');
                hero.classList.remove('hidden');
                setTimeout(() => {
                    hero.style.transform = 'translateY(0)';
                    hero.style.opacity = '1';
                }, 100);
            }, 500);
        }

        function renderRitual() {
            const grid = document.getElementById('membersGrid');
            grid.innerHTML = '';
            
            members.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = `ritual-card min-h-[340px] md:min-h-[380px] p-6 md:p-8 flex flex-col items-center justify-center cursor-pointer group ${!m.name ? 'opacity-20 hover:opacity-100 grayscale' : ''} ${isEditMode ? 'border-red-500 animate-pulse' : ''}`;
                
                // MC head fallback or data url
                const headSrc = m.head ? (m.head.startsWith('data') ? m.head : `https://mc-heads.net/head/${m.head}/128`) : null;

                card.innerHTML = `
                    <div class="card-number italic">VICTIM ${(i+1).toString().padStart(2, '0')}</div>
                    <div class="relative w-24 h-24 md:w-32 md:h-32 mb-6 md:mb-8 transition-transform group-hover:rotate-12">
                        ${headSrc ? `
                            <div class="absolute inset-0 bg-red-600/20 blur-2xl group-hover:bg-red-600/50"></div>
                            <img src="${headSrc}" class="relative w-full h-full object-contain filter drop-shadow-[0_0_15px_rgba(255,0,0,0.5)]">
                        ` : `
                            <div class="nosifer text-5xl md:text-6xl text-red-950/30">†</div>
                        `}
                    </div>
                    <div class="text-center">
                        <h3 class="nosifer text-lg md:text-xl text-white tracking-widest uppercase mb-2 truncate max-w-[120px] md:max-w-[150px] mx-auto">${m.name || 'MISSING'}</h3>
                        <p class="text-[8px] md:text-[9px] text-red-800 font-bold tracking-[0.3em] md:tracking-[0.4em] uppercase">${m.name ? 'ETERNALLY BOUND' : 'SOUL VACANT'}</p>
                    </div>
                `;

                if(isEditMode) card.onclick = () => openEditModal(i);
                grid.appendChild(card);
            });
        }

        // Admin Auth Logic
        function toggleAdminModal() {
            document.getElementById('adminModal').classList.toggle('hidden');
        }

        function verifyAccess() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            if(email === 'tdas81378@gmail.com' && pass === 'meisshub') {
                isAdmin = true;
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('adminSuccess').classList.remove('hidden');
                document.getElementById('adminBtn').classList.remove('hidden');
            } else {
                alert("The Abyss rejects your soul. Incorrect Key.");
            }
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('adminBtn').innerText = isEditMode ? "Seal Contract" : "Alter the Contract";
            renderRitual();
        }

        function logout() {
            isAdmin = false; isEditMode = false;
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('adminSuccess').classList.add('hidden');
            document.getElementById('adminBtn').classList.add('hidden');
            toggleAdminModal();
            renderRitual();
        }

        // Data Management
        function openEditModal(i) {
            targetIndex = i;
            document.getElementById('editName').value = members[i].name;
            document.getElementById('headBase64').value = members[i].head;
            const preview = document.getElementById('headPreview');
            if(members[i].head) {
                preview.src = members[i].head;
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
            }
            document.getElementById('editSlotModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editSlotModal').classList.add('hidden');
        }

        function processFile(input) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('headBase64').value = e.target.result;
                    const preview = document.getElementById('headPreview');
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function confirmEdit() {
            const name = document.getElementById('editName').value;
            const head = document.getElementById('headBase64').value;
            
            members[targetIndex] = { name, head };
            localStorage.setItem('doomfall_ritual_data', JSON.stringify(members));
            renderRitual();
            closeEditModal();
        }
    </script>
</body>
</html>
