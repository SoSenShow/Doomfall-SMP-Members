<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM MC PVP TOURNAMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Anime.js for smooth spring animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --neon-green: #55FF55;
            --cyber-gold: #FFD700;
            --discord-blurple: #5865F2;
            --bg-dark: #0a0a0a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            perspective: 1000px;
        }

        .title-font { font-family: 'Syncopate', sans-serif; }

        /* Animated Particle Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
        }

        /* Glassmorphism Classes */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 255, 0, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 255, 0, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 255, 0, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        /* 3D Card Hover */
        .card-3d {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            transform-style: preserve-3d;
        }
        .card-3d:hover {
            transform: translateZ(20px) rotateX(5deg) rotateY(5deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-color: var(--cyber-gold);
        }

        /* Radial Glow for Start Button */
        .radial-glow {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2), 0 0 60px rgba(255, 215, 0, 0.1);
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
        }

        .blurple-gradient {
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            transition: background 0.3s ease;
        }
        .blurple-gradient:hover {
            background: linear-gradient(135deg, #4752C4 0%, #5865F2 100%);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center overflow-hidden">

    <canvas id="bg-canvas"></canvas>

    <!-- Sidebar (Phase 2 - Spring Animation) -->
    <div id="sidebar" class="fixed top-4 left-4 h-[calc(100vh-32px)] w-72 glass rounded-2xl transform -translate-x-[120%] z-50 p-8 flex flex-col items-center shadow-2xl">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-[#55FF55] to-[#FFD700] rounded-full blur opacity-25 group-hover:opacity-75 transition duration-1000"></div>
            <div class="relative w-32 h-32 bg-gray-800 rounded-full mb-6 border-2 border-white/10 overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=ProPlayer" alt="Avatar" class="w-full h-full object-cover">
            </div>
        </div>
        
        <h3 class="text-2xl font-black title-font mb-1 tracking-tighter">PLAYER_001</h3>
        <div class="flex items-center gap-2 mb-8">
            <span class="w-2 h-2 bg-[#55FF55] rounded-full animate-pulse"></span>
            <span class="text-[#55FF55] text-[10px] font-black uppercase tracking-[0.2em]">Verified Elite</span>
        </div>
        
        <div class="w-full space-y-4">
            <!-- Rank Removed as requested -->
            <div class="p-4 bg-white/5 rounded-xl border border-white/5">
                <p class="text-xs text-gray-400 font-medium italic">"Victory is a habit."</p>
            </div>
        </div>

        <div class="mt-auto w-full text-center">
            <p class="text-[10px] text-gray-600 font-bold tracking-widest uppercase mb-4">MC PVP Client v2.5</p>
        </div>
    </div>

    <!-- Main Landing Screen -->
    <div id="landing-screen" class="text-center z-10">
        <h1 class="glitch title-font text-5xl md:text-8xl font-black mb-12 tracking-tighter italic">
            MC <span class="text-[#55FF55]">PVP</span> <span class="text-[#FFD700]">TOURNAMENT</span>
        </h1>

        <!-- Container for Morphing Effect -->
        <div id="action-container" class="flex justify-center items-center h-24">
            <!-- Discord Verify Button -->
            <button id="verify-btn" class="blurple-gradient flex items-center gap-4 text-white font-black py-5 px-10 rounded-full shadow-xl transform transition-all active:scale-95 group">
                <div class="animate-bounce group-hover:animate-none">
                    <svg class="w-7 h-7 fill-white" viewBox="0 0 127.14 96.36">
                        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.06,72.06,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21a105.73,105.73,0,0,0,32.28,16.15,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.29-16.15C129.5,50.55,124.27,27.05,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
                    </svg>
                </div>
                <span class="tracking-widest uppercase text-sm">Verify Identity</span>
            </button>

            <!-- Start Button (Morph target) -->
            <button id="start-btn" class="hidden radial-glow bg-[#FFD700] text-black font-black py-6 px-20 text-3xl rounded-full shadow-2xl transition-all hover:scale-110 active:scale-90 title-font scale-0">
                START
            </button>
        </div>
    </div>

    <!-- Floating Glass Grid Menu -->
    <div id="grid-menu" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] hidden flex-col items-center justify-center p-6 md:p-10 opacity-0">
        <div class="mb-12 text-center">
            <h2 class="text-4xl md:text-6xl font-black title-font text-[#FFD700] tracking-widest mb-2 italic">DASHBOARD</h2>
            <p class="text-gray-500 font-bold uppercase tracking-[0.5em] text-xs">Choose Your Destination</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full max-w-5xl">
            <!-- Card 1 -->
            <div class="card-3d glass p-10 rounded-3xl flex flex-col items-center cursor-pointer group">
                <div class="text-6xl mb-6 transition-transform group-hover:scale-125 duration-300">📊</div>
                <h3 class="text-2xl font-black title-font">STANDINGS</h3>
                <div class="mt-4 w-12 h-1 bg-[#55FF55] group-hover:w-24 transition-all duration-300"></div>
            </div>

            <!-- Card 2 -->
            <div class="card-3d glass p-10 rounded-3xl flex flex-col items-center cursor-pointer group">
                <div class="text-6xl mb-6 transition-transform group-hover:scale-125 duration-300">⚔️</div>
                <h3 class="text-2xl font-black title-font">MATCHES</h3>
                <div class="mt-4 w-12 h-1 bg-blue-500 group-hover:w-24 transition-all duration-300"></div>
            </div>

            <!-- Card 3 (Admin Restricted) -->
            <div class="card-3d glass p-10 rounded-3xl flex flex-col items-center cursor-pointer group relative overflow-hidden">
                <div class="absolute inset-0 bg-red-900/10 group-hover:bg-red-900/20 transition-colors"></div>
                <div class="text-6xl mb-6 grayscale group-hover:grayscale-0 transition-all">🛡️</div>
                <h3 class="text-2xl font-black title-font text-red-500">ADMIN VIEW</h3>
                <p class="text-[10px] text-red-600 font-bold mt-2 animate-pulse">RESTRICTED ACCESS</p>
            </div>

            <!-- Card 4 -->
            <div class="card-3d glass p-10 rounded-3xl flex flex-col items-center cursor-pointer group">
                <div class="text-6xl mb-6 transition-transform group-hover:scale-125 duration-300">🏆</div>
                <h3 class="text-2xl font-black title-font text-[#FFD700]">PLAYOFFS</h3>
                <div class="mt-4 w-12 h-1 bg-[#FFD700] group-hover:w-24 transition-all duration-300"></div>
            </div>
        </div>

        <button id="close-menu" class="mt-16 text-gray-500 hover:text-white transition-colors font-bold uppercase tracking-[0.3em] text-sm">
            Exit Dashboard
        </button>
    </div>

    <script>
        // --- Particle Background Logic ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.color = Math.random() > 0.5 ? '#55FF55' : '#FFD700';
                this.opacity = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initCanvas();
        for (let i = 0; i < 100; i++) particles.push(new Particle());
        animate();
        window.addEventListener('resize', initCanvas);

        // --- Interaction Logic ---
        const verifyBtn = document.getElementById('verify-btn');
        const startBtn = document.getElementById('start-btn');
        const sidebar = document.getElementById('sidebar');
        const gridMenu = document.getElementById('grid-menu');
        const closeMenu = document.getElementById('close-menu');

        verifyBtn.addEventListener('click', () => {
            // Morph Animation using Anime.js
            anime({
                targets: verifyBtn,
                scale: 0,
                opacity: 0,
                duration: 400,
                easing: 'easeInOutQuad',
                complete: () => {
                    verifyBtn.classList.add('hidden');
                    startBtn.classList.remove('hidden');
                    
                    // Spring-up START button
                    anime({
                        targets: startBtn,
                        scale: [0, 1],
                        opacity: [0, 1],
                        duration: 1200,
                        easing: 'easeOutElastic(1, .5)'
                    });

                    // Elastic sidebar slide-in
                    anime({
                        targets: sidebar,
                        translateX: ['-120%', 0],
                        duration: 1500,
                        easing: 'easeOutElastic(1, .6)'
                    });
                }
            });
        });

        startBtn.addEventListener('click', () => {
            gridMenu.classList.remove('hidden');
            gridMenu.classList.add('flex');
            
            anime({
                targets: gridMenu,
                opacity: [0, 1],
                duration: 600,
                easing: 'easeOutQuad'
            });

            anime({
                targets: '.card-3d',
                translateY: [50, 0],
                opacity: [0, 1],
                delay: anime.stagger(100),
                easing: 'easeOutExpo'
            });
        });

        closeMenu.addEventListener('click', () => {
            anime({
                targets: gridMenu,
                opacity: 0,
                duration: 400,
                easing: 'easeInQuad',
                complete: () => {
                    gridMenu.classList.add('hidden');
                    gridMenu.classList.remove('flex');
                }
            });
        });
    </script>
</body>
</html>
